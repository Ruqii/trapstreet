name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# A new push to a PR cancels any in-flight build for that same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Build
        run: pnpm --filter @trapstreet/web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify GitHub Pages plumbing
        run: |
          set -euo pipefail
          test -f apps/web/out/CNAME
          test -f apps/web/out/.nojekyll
          test -f apps/web/out/index.html
          grep -q '^trapstreet.run$' apps/web/out/CNAME
          echo "Static export looks healthy."
