name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single concurrent deployment, never cancel an in-progress run mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm --filter @trapstreet/web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify GitHub Pages plumbing
        run: |
          set -euo pipefail
          test -f apps/web/out/CNAME
          test -f apps/web/out/.nojekyll
          test -f apps/web/out/index.html
          grep -q '^trapstreet.run$' apps/web/out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
